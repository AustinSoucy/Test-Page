<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Price</title>

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;

      color: white;
    }

    .container {
      background: #1e293b;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    .price {
      font-size: 3rem;
      font-weight: bold;
      color: #facc15;
      margin: 20px 0;
    }

    .updated {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    button {
      margin-top: 25px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #facc15;
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #fde047;
    }
  </style>
</head>
