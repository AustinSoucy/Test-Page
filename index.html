<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Price Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1f2937;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .price {
      font-size: 42px;
      font-weight: bold;
      color: #f59e0b;
      margin: 20px 0;
    }

    .updated {
      color: #9ca3af;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #f59e0b;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #fbbf24;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>₿ Bitcoin Price</h1>

    <div class="price" id="btc-price">
      Loading...
    </div>

    <div class="updated" id="updated-time">
      Fetching latest price...
    </div>

    <button onclick="fetchBitcoinPrice()">
      Refresh
    </button>
  </div>

  <script>
    async function fetchBitcoinPrice() {
      //const priceElement = document.getElementById("btc-price");
      //const updatedElement = document.getElementById("updated-time");

      try {
        const response = await fetch(
          "https://api.coindesk.com/v1/bpi/currentprice/USD.json"
        );

        const data = await response.json();

        const price = data.bpi.USD.rate;
        priceElement.textContent = response;

        //priceElement.textContent = `$${price}`;
        updatedElement.textContent =
          "Last updated: " + new Date().toLocaleTimeString();
        Refresh;

      } catch (error) {
        priceElement.textContent = "Error";
        updatedElement.textContent =
          "Could not load Bitcoin price.";
        console.error(error);
      }
    }

    // Load immediately
    fetchBitcoinPrice();

    // Auto refresh every 60 seconds
    setInterval(fetchBitcoinPrice, 60000);
  </script>

</body>
</html>
